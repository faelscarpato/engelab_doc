<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="100%" height="100%" fill="#0B1F33"/>
<rect x="40" y="40" width="1000" height="180" rx="30" fill="#0E2A44" stroke="#0F4C81" stroke-width="3"/>
<text x="70" y="95" fill="#FFFFFF" font-size="44" font-family="Arial" font-weight="700">Como usar IA em obras com segurança</text>
<text x="70" y="150" fill="#D7E3F4" font-size="24" font-family="Arial">Método geral para evitar decisões técnicas sem validação.</text>
<rect x="40" y="250" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="70" y="300" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">1. Dados</text>
<text x="70" y="350" fill="#111827" font-size="18" font-family="Arial">Informe contexto, documentos e lacunas.</text>
<rect x="555" y="250" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="585" y="300" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">2. Separação</text>
<text x="585" y="350" fill="#111827" font-size="18" font-family="Arial">Dado informado, hipótese, pendência e validação.</text>
<rect x="40" y="495" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="70" y="545" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">3. Prompt seguro</text>
<text x="70" y="595" fill="#111827" font-size="18" font-family="Arial">Proíba a IA de inventar dados ou aprovar soluções.</text>
<rect x="555" y="495" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="585" y="545" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">4. Revisão</text>
<text x="585" y="595" fill="#111827" font-size="18" font-family="Arial">Compare saída com checklist do módulo.</text>
<rect x="40" y="740" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="70" y="790" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">5. Registro</text>
<text x="70" y="840" fill="#111827" font-size="18" font-family="Arial">Documente limites e fontes.</text>
<rect x="555" y="740" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="585" y="790" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">6. Validação</text>
<text x="585" y="840" fill="#111827" font-size="18" font-family="Arial">Encaminhe a profissional habilitado.</text>
</svg>