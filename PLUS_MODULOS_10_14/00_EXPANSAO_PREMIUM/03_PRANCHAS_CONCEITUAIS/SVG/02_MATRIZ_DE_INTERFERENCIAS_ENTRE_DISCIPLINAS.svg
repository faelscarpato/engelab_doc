<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="100%" height="100%" fill="#0B1F33"/>
<rect x="40" y="40" width="1000" height="180" rx="30" fill="#0E2A44" stroke="#00A6D6" stroke-width="3"/>
<text x="70" y="95" fill="#FFFFFF" font-size="44" font-family="Arial" font-weight="700">Matriz de interferências entre disciplinas</text>
<text x="70" y="150" fill="#D7E3F4" font-size="24" font-family="Arial">Modelo visual para registrar conflitos aparentes por ambiente e sistema.</text>
<rect x="40" y="250" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="70" y="300" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">1. Disciplina A</text>
<text x="70" y="350" fill="#111827" font-size="18" font-family="Arial">Sistema ou elemento de origem do conflito aparente.</text>
<rect x="555" y="250" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="585" y="300" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">2. Disciplina B</text>
<text x="585" y="350" fill="#111827" font-size="18" font-family="Arial">Sistema impactado, como estrutura x instalações.</text>
<rect x="40" y="495" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="70" y="545" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">3. Ambiente</text>
<text x="70" y="595" fill="#111827" font-size="18" font-family="Arial">Localização do ponto crítico: pavimento, cômodo ou eixo.</text>
<rect x="555" y="495" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="585" y="545" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">4. Evidência</text>
<text x="585" y="595" fill="#111827" font-size="18" font-family="Arial">Prancha, foto, anotação, corte, detalhe ou descrição.</text>
<rect x="40" y="740" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="70" y="790" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">5. Pendência</text>
<text x="70" y="840" fill="#111827" font-size="18" font-family="Arial">Dado ausente ou decisão que precisa de revisão.</text>
<rect x="555" y="740" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="585" y="790" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">6. Responsável</text>
<text x="585" y="840" fill="#111827" font-size="18" font-family="Arial">Projetista ou profissional a consultar para validação.</text>
</svg>