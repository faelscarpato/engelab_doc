<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="100%" height="100%" fill="#0B1F33"/>
<rect x="40" y="40" width="1000" height="180" rx="30" fill="#0E2A44" stroke="#00A6D6" stroke-width="3"/>
<text x="70" y="95" fill="#FFFFFF" font-size="44" font-family="Arial" font-weight="700">Fluxo de compatibilização técnica com IA</text>
<text x="70" y="150" fill="#D7E3F4" font-size="24" font-family="Arial">Da coleta de dados à matriz preliminar de interferências.</text>
<rect x="40" y="250" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="70" y="300" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">1. Coletar dados</text>
<text x="70" y="350" fill="#111827" font-size="18" font-family="Arial">Reunir plantas, memoriais, pranchas, fotos e observações disponíveis.</text>
<rect x="555" y="250" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="585" y="300" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">2. Separar disciplinas</text>
<text x="585" y="350" fill="#111827" font-size="18" font-family="Arial">Arquitetura, estrutura, elétrica, hidrossanitário, HVAC, incêndio e outros siste</text>
<rect x="40" y="495" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="70" y="545" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">3. Mapear interferências</text>
<text x="70" y="595" fill="#111827" font-size="18" font-family="Arial">Registrar ambiente, elemento, conflito aparente, evidência e lacuna.</text>
<rect x="555" y="495" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="585" y="545" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">4. Classificar triagem</text>
<text x="585" y="595" fill="#111827" font-size="18" font-family="Arial">Gravidade apenas preliminar: baixa, média, alta ou a validar.</text>
<rect x="40" y="740" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="70" y="790" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">5. Gerar perguntas</text>
<text x="70" y="840" fill="#111827" font-size="18" font-family="Arial">Converter lacunas em perguntas objetivas aos projetistas.</text>
<rect x="555" y="740" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="585" y="790" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">6. Validar</text>
<text x="585" y="840" fill="#111827" font-size="18" font-family="Arial">Encaminhar a profissional habilitado antes de decisão técnica.</text>
</svg>