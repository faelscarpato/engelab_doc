<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
<rect width="100%" height="100%" fill="#0B1F33"/>
<rect x="40" y="40" width="1000" height="180" rx="30" fill="#0E2A44" stroke="#0F4C81" stroke-width="3"/>
<text x="70" y="95" fill="#FFFFFF" font-size="44" font-family="Arial" font-weight="700">Fluxo geral dos Módulos IA 10 a 14</text>
<text x="70" y="150" fill="#D7E3F4" font-size="24" font-family="Arial">Integração entre compatibilização, orçamento, planejamento, vistoria e SST.</text>
<rect x="40" y="250" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="70" y="300" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">1. 10 Compatibiliza</text>
<text x="70" y="350" fill="#111827" font-size="18" font-family="Arial">Mapeia interferências e lacunas.</text>
<rect x="555" y="250" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="585" y="300" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">2. 11 Quantifica</text>
<text x="585" y="350" fill="#111827" font-size="18" font-family="Arial">Organiza serviços e quantidades.</text>
<rect x="40" y="495" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="70" y="545" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">3. 12 Planeja</text>
<text x="70" y="595" fill="#111827" font-size="18" font-family="Arial">Estrutura EAP, atividades e riscos.</text>
<rect x="555" y="495" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="585" y="545" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">4. 13 Registra</text>
<text x="585" y="595" fill="#111827" font-size="18" font-family="Arial">Organiza vistoria e achados aparentes.</text>
<rect x="40" y="740" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="70" y="790" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">5. 14 Segurança</text>
<text x="70" y="840" fill="#111827" font-size="18" font-family="Arial">Organiza riscos, EPI, EPC e DDS.</text>
<rect x="555" y="740" width="485" height="215" rx="24" fill="#ffffff" stroke="#C8D7E7" stroke-width="2"/>
<text x="585" y="790" fill="#0B1F33" font-size="24" font-family="Arial" font-weight="700">6. Controle</text>
<text x="585" y="840" fill="#111827" font-size="18" font-family="Arial">Pendências e validações conectam todos os módulos.</text>
</svg>